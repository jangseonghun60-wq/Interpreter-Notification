<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zoom Interpreter Panel</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: transparent;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 4px;
    }

    /* ── 통역사 패널 ── */
    #interpreterPanel {
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 180px;
      overflow: hidden;
      display: none;
    }

    .btn-group { display: flex; flex-direction: column; gap: 5px; padding: 6px; }
    button {
      padding: 7px 8px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 0.72rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .btn-invite { background: #e67e22; }
    .btn-invite:hover:not(:disabled) { background: #ca6f1e; }
    .btn-msg { background: #0e71eb; }
    .btn-msg:hover:not(:disabled) { background: #085bb5; }
    .divider { border: none; border-top: 1px solid #eee; margin: 2px 0; }
    .status { padding: 4px 6px; font-size: 0.65rem; color: #888; }
    .notice { padding: 0 6px 4px; color: #218838; font-weight: 500; min-height: 14px; font-size: 0.65rem; }
    .error { color: #b72c2c; }

    /* 통역사용 알림 배너 */
    #alertOverlay {
      display: none;
      background: #f1c40f;
      border-radius: 6px;
      padding: 8px;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin: 4px 6px;
      text-align: center;
    }
    #alertOverlay.show { display: flex; }
    #alertIcon { font-size: 1rem; }
    #alertText { font-size: 0.7rem; font-weight: 700; color: #333; line-height: 1.3; }
    #alertTimer { font-size: 0.6rem; color: #666; }

    /* ── 참가자용 전체화면 배너 ── */
    #attendeeAlert {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #f1c40f;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 20px;
      z-index: 999;
      border-radius: 8px;
    }
    #attendeeAlert.show { display: flex; }
    #attendeeAlertIcon { font-size: 3rem; }
    #attendeeAlertText {
      font-size: 2rem;
      font-weight: 700;
      color: #333;
      line-height: 1.3;
      word-break: break-word;
    }
    #attendeeAlertTimer { font-size: 1rem; color: #555; }
  </style>
</head>
<body>

  <!-- 통역사 패널 -->
  <div id="interpreterPanel">
    <div id="status" class="status">Initializing...</div>

    <div id="alertOverlay">
      <div id="alertIcon">⚠️</div>
      <div id="alertText"></div>
      <div id="alertTimer"></div>
    </div>

    <div class="btn-group">
      <button id="btnInvite" class="btn-invite" onclick="inviteAll()" disabled>
        📨 초대 보내기
      </button>
      <hr class="divider">
      <button id="btn1" class="btn-msg" onclick="sendMsg('Please speak closer to the mic')" disabled>
        Speak closer to mic
      </button>
      <button id="btn2" class="btn-msg" onclick="sendMsg('Please speak slower')" disabled>
        Speak slower
      </button>
      <button id="btn3" class="btn-msg" onclick="sendMsg('Audio is unclear')" disabled>
        Audio is unclear
      </button>
    </div>

    <div id="notice" class="notice"></div>
  </div>

  <!-- 참가자용 전체화면 배너 -->
  <div id="attendeeAlert">
    <div id="attendeeAlertIcon">⚠️</div>
    <div id="attendeeAlertText"></div>
    <div id="attendeeAlertTimer"></div>
  </div>

  <script src="https://appssdk.zoom.us/sdk.min.js"></script>
  <script>
    const INTERPRETER_EMAILS = [
      'sh.jang@krafton.com',
      'jangseonghun60@gmail.com',
    ];

    let sdkReady = false;
    let alertTimeout = null;
    let currentRole = null;

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function setNotice(msg, isError = false) {
      const el = document.getElementById('notice');
      el.textContent = msg;
      el.className = isError ? 'notice error' : 'notice';
    }

    function enableButtons() {
      ['btnInvite','btn1','btn2','btn3'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
    }

    function startCountdown(timerId, onEnd) {
      if (alertTimeout) clearInterval(alertTimeout);
      let remaining = 5;
      document.getElementById(timerId).textContent = remaining + '초 후 사라집니다';
      alertTimeout = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(alertTimeout);
          onEnd();
        } else {
          document.getElementById(timerId).textContent = remaining + '초 후 사라집니다';
        }
      }, 1000);
    }

    function showInterpreterAlert(message) {
      const overlay = document.getElementById('alertOverlay');
      document.getElementById('alertText').textContent = message;
      overlay.classList.add('show');
      startCountdown('alertTimer', () => overlay.classList.remove('show'));
    }

    function showAttendeeAlert(message) {
      const banner = document.getElementById('attendeeAlert');
      document.getElementById('attendeeAlertText').textContent = message;
      banner.classList.add('show');
      startCountdown('attendeeAlertTimer', () => banner.classList.remove('show'));
    }

    async function initZoom() {
      try {
        await zoomSdk.config({
          version: '0.16',
          popoutSize: { width: 180, height: 220 }, // 최소 크기
          capabilities: [
            'sendMessage', 'onMessage', 'getMeetingContext',
            'getUserContext', 'getRunningContext',
            'sendAppInvitation', 'getMeetingParticipants',
            'expandApp'
          ]
        });

        // 앱 시작 시 팝업(최소화) 모드로 설정
        try {
          await zoomSdk.expandApp({ action: 'collapse' });
        } catch(e) {
          console.warn('expandApp collapse failed:', e.message);
        }

        // 이메일로 역할 판별
        let email = '';
        try {
          const userCtx = await zoomSdk.getUserContext();
          email = (userCtx.email || '').toLowerCase().trim();
        } catch(e) {
          console.warn('getUserContext failed:', e.message);
        }

        const isInterpreter = INTERPRETER_EMAILS
          .map(e => e.toLowerCase().trim())
          .includes(email);

        currentRole = isInterpreter ? 'interpreter' : 'attendee';
        sdkReady = true;

        if (currentRole === 'interpreter') {
          document.getElementById('interpreterPanel').style.display = 'block';
          setStatus('✅ Ready');
          enableButtons();
        }

        zoomSdk.onMessage((data) => {
          try {
            const msg = data.payload.message;
            if (currentRole === 'interpreter') {
              showInterpreterAlert(msg);
            } else {
              showAttendeeAlert(msg);
            }
          } catch(e) {
            console.error('onMessage error:', e);
          }
        });

      } catch(e) {
        currentRole = 'attendee';
        console.error('SDK init failed:', e.message);
      }
    }

    async function inviteAll() {
      if (!sdkReady) { setNotice('SDK not ready', true); return; }
      try {
        const participants = await zoomSdk.getMeetingParticipants();
        const uuids = participants.participants.map(p => p.participantUUID);
        await zoomSdk.sendAppInvitation({ participantUUIDs: uuids });
        setNotice('✔️ 초대 완료!');
        setTimeout(() => setNotice(''), 3000);
      } catch(err) {
        setNotice('Failed: ' + err.message, true);
      }
    }

    async function sendMsg(message) {
      if (!sdkReady) { setNotice('SDK not ready', true); return; }
      showInterpreterAlert(message);
      try {
        await zoomSdk.sendMessage({ payload: { message } });
      } catch(err) {
        console.error('sendMessage error:', err);
      }
    }

    initZoom();
  </script>
</body>
</html>
